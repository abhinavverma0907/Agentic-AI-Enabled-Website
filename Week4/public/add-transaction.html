<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Add new income or expense transactions to your Finance Tracker">
  <title>Add Transaction | FinanceTracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <button class="mobile-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">💰</div>
      <span class="brand-text">FinanceTracker</span>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section-title">Overview</div>
      <a href="dashboard.html" class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="add-transaction.html" class="nav-link active"><span class="nav-icon">➕</span> Add Transaction</a>
      <a href="history.html" class="nav-link"><span class="nav-icon">📋</span> History</a>
      <div class="nav-section-title">Insights</div>
      <a href="reports.html" class="nav-link"><span class="nav-icon">📈</span> Reports</a>
      <a href="assistant.html" class="nav-link"><span class="nav-icon">🤖</span> AI Assistant</a>
      <div class="nav-section-title">Preferences</div>
      <a href="settings.html" class="nav-link"><span class="nav-icon">⚙️</span> Settings</a>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1>Add Transaction</h1>
      <p class="page-subtitle">Record your income or expenses</p>
    </div>

    <div class="card">
      <form id="transaction-form">
        <div class="form-group">
          <label class="form-label">Transaction Type</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="type" value="expense" checked>
              <span class="radio-label">Expense</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="type" value="income">
              <span class="radio-label">Income</span>
            </label>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="description">Description</label>
            <input type="text" id="description" class="form-input" placeholder="e.g. Grocery shopping" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="amount">Amount</label>
            <input type="number" id="amount" class="form-input" placeholder="0.00" min="0" step="0.01" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="category">Category</label>
            <select id="category" class="form-select">
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Rent">Rent</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Shopping">Shopping</option>
              <option value="Health">Health</option>
              <option value="Education">Education</option>
              <option value="Salary">Salary</option>
              <option value="Freelance">Freelance</option>
              <option value="Investment">Investment</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="date">Date</label>
            <input type="date" id="date" class="form-input" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block">Add Transaction</button>
      </form>
    </div>
  </main>

  <div id="toast-container" class="toast-container"></div>

  <script src="js/storage.js"></script>
  <script>
    // Set default date to today
    const dateInput = document.getElementById('date');
    const today = new Date().toISOString().split('T')[0];
    dateInput.value = today;

    // Toast notification system
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      container.appendChild(toast);

      // Trigger reflow for animation
      toast.offsetHeight;
      toast.classList.add('toast-visible');

      setTimeout(() => {
        toast.classList.remove('toast-visible');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // Form submission
    const form = document.getElementById('transaction-form');
    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const description = document.getElementById('description').value.trim();
      const amount = parseFloat(document.getElementById('amount').value);
      const type = document.querySelector('input[name="type"]:checked').value;
      const category = document.getElementById('category').value;
      const date = document.getElementById('date').value;

      // Validation
      if (!description) {
        showToast('Please enter a description.', 'error');
        return;
      }
      if (!amount || amount <= 0) {
        showToast('Please enter a valid amount greater than 0.', 'error');
        return;
      }

      // Save transaction
      addTransaction({ description, amount, type, category, date });
      showToast('Transaction added successfully!', 'success');

      // Reset form
      form.reset();
      document.querySelector('input[name="type"][value="expense"]').checked = true;
      dateInput.value = today;
    });
  </script>
</body>
</html>
